default_language_version:
  python: python3.12

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        # Fixtures are byte-snapshots of external data (Synthea FHIR
        # bundles, CT.gov JSON, Chia BRAT files); BRAT in particular
        # records *byte offsets* into the .txt files, so stripping
        # trailing whitespace on lines silently corrupts those offsets.
        exclude: ^tests/fixtures/
      - id: end-of-file-fixer
        exclude: ^tests/fixtures/
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: public-artifact-privacy-gate
        name: public artifact privacy gate
        entry: uv run python scripts/check_public_artifact_privacy.py
        language: system
        files: ^eval/
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
